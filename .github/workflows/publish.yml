name: Build & Publish to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "ref=ghcr.io/${OWNER,,}/nemotron-agent" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Nemotron Agent image published ✅"
            echo ""
            echo "**Image URL:** \`${{ steps.img.outputs.ref }}:latest\`"
            echo ""
            echo "**Next steps:**"
            echo "1. Make the package **public**: GitHub → Profile → Packages → nemotron-agent → Package settings → Change visibility → Public"
            echo "2. Register on GMI AgentBox with image URL: \`${{ steps.img.outputs.ref }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
